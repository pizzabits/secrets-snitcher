data:
  api.py: |
    """secrets-snitcher — eBPF-powered Kubernetes secret access monitor.

    Copyright (c) 2026 Michael Ridner. All rights reserved.
    Licensed under the MIT License. See LICENSE file in the project root.
    """
    import ctypes
    import hashlib
    import json
    import os
    import platform
    import sys
    import threading
    import time
    import urllib.request
    import uuid
    from collections import defaultdict
    from datetime import datetime, timezone
    from http.server import BaseHTTPRequestHandler, HTTPServer

    # --- Telemetry ---
    _TELEMETRY_URL = "https://ridner.dev/api/telemetry"
    _TELEMETRY_DEDUP_FILE = "/tmp/secrets_snitcher_telemetry_last"
    _TELEMETRY_BOOT_FILE = "/tmp/secrets_snitcher_boot_time"
    _TELEMETRY_ID_FILE = "/tmp/secrets_snitcher_id"
    _TELEMETRY_DEDUP_SECONDS = 86400
    _TELEMETRY_TIMEOUT = 3
    _VERSION = "0.4.0"

    def _get_install_id():
        """Return a SHA-256 hash of the most stable available identifier."""
        raw_id = None

        # 1. Try kube-system namespace UID via Kubernetes API
        k8s_host = os.environ.get("KUBERNETES_SERVICE_HOST")
        if k8s_host and raw_id is None:
            try:
                k8s_port = os.environ.get("KUBERNETES_SERVICE_PORT", "443")
                token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                with open(token_path) as f:
                    token = f.read().strip()
                url = (
                    f"https://{k8s_host}:{k8s_port}"
                    "/api/v1/namespaces/kube-system"
                )
                import ssl
                ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                if not os.path.exists(ca_path):
                    raise FileNotFoundError(ca_path)
                ctx = ssl.create_default_context()
                ctx.load_verify_locations(ca_path)
                req = urllib.request.Request(
                    url,
                    headers={"Authorization": f"Bearer {token}"},
                )
                resp = urllib.request.urlopen(req, timeout=_TELEMETRY_TIMEOUT, context=ctx)
                ns_data = json.loads(resp.read())
                uid = ns_data.get("metadata", {}).get("uid", "")
                if uid:
                    raw_id = uid
            except Exception:
                pass

        # 2. Try /etc/machine-id
        if raw_id is None:
            try:
                with open("/etc/machine-id") as f:
                    mid = f.read().strip()
                    if mid:
                        raw_id = mid
            except Exception:
                pass

        # 3. Fallback - generate and persist a UUID
        if raw_id is None:
            try:
                with open(_TELEMETRY_ID_FILE) as f:
                    raw_id = f.read().strip()
            except Exception:
                pass
            if not raw_id:
                raw_id = str(uuid.uuid4())
                try:
                    with open(_TELEMETRY_ID_FILE, "w") as f:
                        f.write(raw_id)
                except Exception:
                    pass

        return hashlib.sha256(raw_id.strip().encode()).hexdigest()

    def _get_deployment_type():
        """Return 'daemonset', 'pod', or 'standalone'."""
        if os.environ.get("KUBERNETES_SERVICE_HOST"):
            try:
                with open("/etc/podinfo/labels") as f:
                    if "controller-revision-hash" in f.read():
                        return "daemonset"
            except Exception:
                pass
            return "pod"
        return "standalone"

    def _send_telemetry():
        """Send a single anonymous telemetry ping (non-blocking daemon thread)."""
        if os.environ.get("SECRETS_SNITCHER_NO_TELEMETRY") == "1":
            return
        if os.environ.get("DO_NOT_TRACK") == "1":
            return

        def _do_send():
            try:
                # 24h dedup check
                try:
                    with open(_TELEMETRY_DEDUP_FILE) as f:
                        last = float(f.read().strip())
                    if time.time() - last < _TELEMETRY_DEDUP_SECONDS:
                        return
                except Exception:
                    pass

                # Track boot time (write once, never overwrite)
                try:
                    with open(_TELEMETRY_BOOT_FILE) as f:
                        boot = float(f.read().strip())
                except Exception:
                    boot = time.time()
                    try:
                        with open(_TELEMETRY_BOOT_FILE, "w") as f:
                            f.write(str(boot))
                    except Exception:
                        pass
                uptime_h = min(int((time.time() - boot) / 3600), 720)

                payload = json.dumps({
                    "distinct_id": _get_install_id(),
                    "tool": "secrets-snitcher",
                    "version": _VERSION,
                    "deployment_type": _get_deployment_type(),
                    "kernel": platform.release(),
                    "arch": platform.machine(),
                    "python": platform.python_version(),
                    "uptime_hours": uptime_h,
                }).encode()

                req = urllib.request.Request(
                    _TELEMETRY_URL,
                    data=payload,
                    headers={"Content-Type": "application/json"},
                    method="POST",
                )
                urllib.request.urlopen(req, timeout=_TELEMETRY_TIMEOUT)

                # Record timestamp on success
                try:
                    with open(_TELEMETRY_DEDUP_FILE, "w") as f:
                        f.write(str(time.time()))
                except Exception:
                    pass
            except Exception:
                pass

        t = threading.Thread(target=_do_send, daemon=True)
        t.start()

    # --- Feature toggles ---
    _METRICS_ENABLED = os.environ.get("SNITCHER_METRICS_ENABLED", "true").lower() != "false"
    _DASHBOARD_ENABLED = os.environ.get("SNITCHER_DASHBOARD_ENABLED", "true").lower() != "false"

    # --- Prometheus metrics ---
    def _prom_escape(v):
        return v.replace("\\", "\\\\").replace('"', '\\"').replace("\n", "\\n")

    def _format_metrics(entries, ebpf_attached, window_seconds):
        lines = [
            "# HELP snitcher_ebpf_attached Whether the eBPF probe is loaded in the kernel.",
            "# TYPE snitcher_ebpf_attached gauge",
            f"snitcher_ebpf_attached {1 if ebpf_attached else 0}",
            "# HELP snitcher_observation_window_seconds Rolling observation window length.",
            "# TYPE snitcher_observation_window_seconds gauge",
            f"snitcher_observation_window_seconds {window_seconds}",
            "# HELP snitcher_tracked_secrets Number of active pod/secret combinations being tracked.",
            "# TYPE snitcher_tracked_secrets gauge",
            f"snitcher_tracked_secrets {len(entries)}",
            "# HELP snitcher_secret_reads_per_second Current read rate over the observation window.",
            "# TYPE snitcher_secret_reads_per_second gauge",
            "# HELP snitcher_secret_reads_total Reads observed in the current window.",
            "# TYPE snitcher_secret_reads_total gauge",
            "# HELP snitcher_secret_cached Whether the secret appears to be cached in memory.",
            "# TYPE snitcher_secret_cached gauge",
            "# HELP snitcher_secret_last_read_timestamp_seconds Unix timestamp of the most recent read.",
            "# TYPE snitcher_secret_last_read_timestamp_seconds gauge",
        ]
        for e in entries:
            labels = (
                f'{{pod="{_prom_escape(e["pod"])}",'
                f'container="{_prom_escape(e["container"])}",'
                f'secret_path="{_prom_escape(e["secret_path"])}"}}'
            )
            lines.append(f"snitcher_secret_reads_per_second{labels} {e['reads_per_sec']}")
            lines.append(f"snitcher_secret_reads_total{labels} {e.get('read_count', 0)}")
            lines.append(f"snitcher_secret_cached{labels} {1 if e['cached'] else 0}")
            last_str = e["last_read"].replace("Z", "+00:00")
            last_ts = datetime.fromisoformat(last_str).timestamp()
            lines.append(f"snitcher_secret_last_read_timestamp_seconds{labels} {last_ts:.3f}")
        lines.append("")
        return "\n".join(lines)

    # --- Dashboard ---
    _DASHBOARD_HTML = None
    if _DASHBOARD_ENABLED:
        try:
            with open("/code/dashboard.html", "rb") as f:
                _DASHBOARD_HTML = f.read()
        except Exception:
            pass

    # --- Aggregator ---
    WINDOW = 60
    _lock = threading.Lock()
    _accesses = defaultdict(lambda: {"count": 0, "last": 0, "comm": ""})

    def record_access(pid, comm, filepath, timestamp):
        key = (pid, filepath)
        with _lock:
            _accesses[key]["count"] += 1
            _accesses[key]["last"] = time.time()
            _accesses[key]["comm"] = comm

    def get_summary():
        now = time.time()
        results = []
        with _lock:
            for (pid, path), data in list(_accesses.items()):
                age = now - data["last"]
                if age > WINDOW:
                    del _accesses[(pid, path)]
                    continue
                rps = data["count"] / min(age + 0.1, WINDOW)
                # Resolve pod name from /proc
                pod = _resolve_pod(pid)
                results.append({
                    "pod": pod,
                    "container": data["comm"],
                    "secret_path": path,
                    "read_count": data["count"],
                    "reads_per_sec": round(rps, 1),
                    "last_read": datetime.fromtimestamp(data["last"], tz=timezone.utc).isoformat(),
                    "cached": rps < 1,
                })
        return results

    def _resolve_pod(pid):
        try:
            with open(f"/host-proc/{pid}/environ", "rb") as f:
                env = f.read()
            for part in env.split(b"\x00"):
                if part.startswith(b"HOSTNAME="):
                    return part.split(b"=", 1)[1].decode()
        except Exception:
            pass
        return f"pid-{pid}"

    # --- BPF ---
    BPF_PROGRAM = r"""
    #include <uapi/linux/ptrace.h>
    #include <linux/sched.h>
    struct event_t {
        u32 pid;
        char comm[16];
        char filename[256];
        u64 timestamp;
    };
    BPF_PERF_OUTPUT(events);

    static inline bool is_secret_path(const char *path) {
        char buf[20];
        bpf_probe_read_user_str(buf, sizeof(buf), path);

        // /var/run/secrets/ (K8s service account tokens)
        if (buf[0]=='/' && buf[1]=='v' && buf[2]=='a' && buf[3]=='r' &&
            buf[4]=='/' && buf[5]=='r' && buf[6]=='u' && buf[7]=='n' &&
            buf[8]=='/' && buf[9]=='s' && buf[10]=='e' && buf[11]=='c' &&
            buf[12]=='r' && buf[13]=='e' && buf[14]=='t' && buf[15]=='s' &&
            buf[16]=='/')
            return true;

        // /var/secrets/
        if (buf[0]=='/' && buf[1]=='v' && buf[2]=='a' && buf[3]=='r' &&
            buf[4]=='/' && buf[5]=='s' && buf[6]=='e' && buf[7]=='c' &&
            buf[8]=='r' && buf[9]=='e' && buf[10]=='t' && buf[11]=='s' &&
            buf[12]=='/')
            return true;

        // /mnt/secrets-store/
        if (buf[0]=='/' && buf[1]=='m' && buf[2]=='n' && buf[3]=='t' &&
            buf[4]=='/' && buf[5]=='s' && buf[6]=='e' && buf[7]=='c')
            return true;

        // /run/secrets/
        if (buf[0]=='/' && buf[1]=='r' && buf[2]=='u' && buf[3]=='n' &&
            buf[4]=='/' && buf[5]=='s' && buf[6]=='e' && buf[7]=='c' &&
            buf[8]=='r' && buf[9]=='e' && buf[10]=='t' && buf[11]=='s' &&
            buf[12]=='/')
            return true;

        return false;
    }

    TRACEPOINT_PROBE(syscalls, sys_enter_openat) {
        const char *fname = args->filename;
        if (!is_secret_path(fname))
            return 0;
        struct event_t evt = {};
        evt.pid = bpf_get_current_pid_tgid() >> 32;
        bpf_get_current_comm(&evt.comm, sizeof(evt.comm));
        bpf_probe_read_user_str(evt.filename, sizeof(evt.filename), fname);
        evt.timestamp = bpf_ktime_get_ns();
        events.perf_submit(args, &evt, sizeof(evt));
        return 0;
    }
    """

    class Event(ctypes.Structure):
        _fields_ = [
            ("pid", ctypes.c_uint32),
            ("comm", ctypes.c_char * 16),
            ("filename", ctypes.c_char * 256),
            ("timestamp", ctypes.c_uint64),
        ]

    def handle_event(cpu, data, size):
        event = ctypes.cast(data, ctypes.POINTER(Event)).contents
        record_access(
            pid=event.pid,
            comm=event.comm.decode("utf-8", errors="replace").rstrip("\x00"),
            filepath=event.filename.decode("utf-8", errors="replace").rstrip("\x00"),
            timestamp=event.timestamp,
        )

    # --- HTTP ---
    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/api/v1/secret-access":
                body = json.dumps({
                    "timestamp": datetime.now(timezone.utc).isoformat(),
                    "observation_window_seconds": WINDOW,
                    "entries": get_summary(),
                }, indent=2).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.end_headers()
                self.wfile.write(body)
            elif self.path == "/healthz":
                body = json.dumps({"status": "ok", "ebpf_attached": bpf is not None}).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.end_headers()
                self.wfile.write(body)
            elif self.path == "/metrics" and _METRICS_ENABLED:
                entries = get_summary()
                body = _format_metrics(entries, bpf is not None, WINDOW).encode()
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
                self.send_header("Content-Length", len(body))
                self.end_headers()
                self.wfile.write(body)
            elif self.path in ("/", "/dashboard") and _DASHBOARD_HTML:
                self.send_response(200)
                self.send_header("Content-Type", "text/html; charset=utf-8")
                self.send_header("Content-Length", len(_DASHBOARD_HTML))
                self.end_headers()
                self.wfile.write(_DASHBOARD_HTML)
            else:
                self.send_error(404)
        def log_message(self, fmt, *args):
            print(f"[api] {args[0]}", file=sys.stderr)

    # --- Main ---
    bpf = None
    print("", file=sys.stderr)
    print("  secrets-snitcher v0.4.0", file=sys.stderr)
    print("  eBPF-powered Kubernetes secret access monitor", file=sys.stderr)
    print("  By Michael Ridner — MIT License", file=sys.stderr)
    print("", file=sys.stderr)
    _send_telemetry()
    try:
        from bcc import BPF
        print("[ebpf] Loading kernel probe:", file=sys.stderr)
        print("", file=sys.stderr)
        for line in BPF_PROGRAM.strip().splitlines():
            print(f"  {line}", file=sys.stderr)
        print("", file=sys.stderr)
        print("[ebpf] Compiling BPF program...", file=sys.stderr)
        bpf = BPF(text=BPF_PROGRAM)
        bpf["events"].open_perf_buffer(handle_event)
        print("[ebpf] BPF program loaded into kernel", file=sys.stderr)
        print("[ebpf] Attached tracepoint: syscalls:sys_enter_openat", file=sys.stderr)
        print("[ebpf] Perf buffer open — streaming events", file=sys.stderr)
        print("", file=sys.stderr)
        print("[watch] /var/run/secrets/**", file=sys.stderr)
        print("[watch] /mnt/secrets-store/**", file=sys.stderr)
        print("[watch] /run/secrets/**", file=sys.stderr)
        print("", file=sys.stderr)
        def poll():
            while True:
                bpf.perf_buffer_poll(timeout=100)
        t = threading.Thread(target=poll, daemon=True)
        t.start()
    except Exception as e:
        print(f"[ebpf] Not available: {e}", file=sys.stderr)
    print("[api] GET /api/v1/secret-access", file=sys.stderr)
    print("[api] GET /healthz", file=sys.stderr)
    if _METRICS_ENABLED:
        print("[api] GET /metrics (Prometheus)", file=sys.stderr)
    if _DASHBOARD_HTML:
        print("[api] GET /  (dashboard)", file=sys.stderr)
    print("[api] Listening on :9100", file=sys.stderr)
    print("[ready] Watching for secret access...", file=sys.stderr)
    HTTPServer(("0.0.0.0", 9100), Handler).serve_forever()
  live.py: |
    """Live-updating secret access monitor."""
    import json, sys, time, urllib.request
    from datetime import datetime, timezone

    B = "\033[1m"
    R = "\033[91m"
    G = "\033[92m"
    Y = "\033[93m"
    D = "\033[2m"
    X = "\033[0m"
    CLEAR = "\033[2J\033[H"

    prev_pods = set()

    while True:
        try:
            data = json.loads(urllib.request.urlopen("http://localhost:9100/api/v1/secret-access").read())
        except Exception:
            time.sleep(2)
            continue

        entries = data.get("entries", [])
        entries.sort(key=lambda x: x["reads_per_sec"], reverse=True)
        now = datetime.now(timezone.utc).strftime("%H:%M:%S")

        sys.stdout.write(CLEAR)

        print(f"  {B}secrets-snitcher{X} — eBPF kernel probe    {D}{now} UTC{X}")
        print()
        print(f"  {D}TRACEPOINT_PROBE(syscalls, sys_enter_openat) {{{X}")
        print(f"  {D}    if (!is_secret_path(fname)) return 0;{X}")
        print(f"  {D}    evt.pid = bpf_get_current_pid_tgid() >> 32;{X}")
        print(f"  {D}    events.perf_submit(args, &evt, sizeof(evt));{X}")
        print(f"  {D}}}{X}")
        print()

        has_anomaly = any(not e["cached"] and e["reads_per_sec"] > 5 for e in entries)
        if has_anomaly:
            print(f"  {R}{B}! ANOMALY DETECTED{X}")
        else:
            print(f"  {G}All normal{X}")
        print()

        print(f"  {'POD':<30} {'SECRET':<12} {'READS/SEC':>10}  STATUS")
        print(f"  {'─' * 30} {'─' * 12} {'─' * 10}  {'─' * 12}")

        curr_pods = set()
        for e in entries:
            pod = e["pod"]
            curr_pods.add(pod)
            if len(pod) > 30:
                pod = pod[:27] + "..."
            secret = e["secret_path"].split("/")[-1]
            rps = e["reads_per_sec"]
            new = pod.strip(".") not in {p[:27] for p in prev_pods} and len(prev_pods) > 0
            if not e["cached"] and rps > 5:
                rps_str = f"{R}{rps:>10.1f}{X}"
                status = f"{R}NOT CACHED{X}"
            elif not e["cached"]:
                rps_str = f"{rps:>10.1f}"
                status = "not cached"
            else:
                rps_str = f"{G}{rps:>10.1f}{X}"
                status = f"{G}cached{X}"
            tag = f"  {Y}<< NEW{X}" if new else ""
            print(f"  {pod:<30} {secret:<12} {rps_str}  {status}{tag}")

        print()
        print(f"  {D}watching: /var/run/secrets/** /mnt/secrets-store/** /run/secrets/**{X}")
        print(f"  {D}window: {data['observation_window_seconds']}s | refreshing every 2s | ctrl-c to exit{X}")
        sys.stdout.flush()

        prev_pods = curr_pods
        time.sleep(2)
