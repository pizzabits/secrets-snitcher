apiVersion: v1
kind: Namespace
metadata:
  name: secrets-snitcher
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-snitcher
  namespace: secrets-snitcher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secrets-snitcher-telemetry
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    resourceNames: ["kube-system"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secrets-snitcher-telemetry
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secrets-snitcher-telemetry
subjects:
  - kind: ServiceAccount
    name: secrets-snitcher
    namespace: secrets-snitcher
